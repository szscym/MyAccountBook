name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y unzip wget curl openjdk-17-jdk python3-pip

      - name: Install Android cmdline-tools
        run: |
          cd /tmp
          # Try multiple download URLs (any one works)
          curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-latest.zip" -o cmdline-tools.zip || \
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O cmdline-tools.zip || \
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip" -O cmdline-tools.zip
          ls -la cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p $HOME/android/cmdline-tools
          mv cmdline-tools $HOME/android/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV

      - name: Install SDK platform, build-tools & NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
            "platforms;android-34" "build-tools;34.0.0" "ndk;27.0.12077973"
          # Verify aidl exists
          find $ANDROID_HOME -name "aidl*" -type f 2>/dev/null
          echo "AIDL check: $(find $ANDROID_HOME -name aidl -type f 2>/dev/null | head -1)"
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Install Buildozer
        run: |
          pip install --user buildozer "cython<3.0.0"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK
        timeout-minutes: 120
        run: |
          if [ -d "MyAccountBook" ]; then cd MyAccountBook; fi
          echo "Building in: $(pwd)"
          yes | buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: myaccountbook-apk
          path: "**/bin/*.apk"
