name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Buildozer & system deps
        run: |
          pip install --upgrade buildozer cython
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk \
            libffi-dev libssl-dev libltdl-dev

      - name: Build APK
        run: |
          DIR="."
          [ -d "MyAccountBook" ] && DIR="MyAccountBook"
          cd "$DIR"
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: myaccountbook-apk
          path: "**/bin/*.apk"
