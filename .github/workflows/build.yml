name: Build APK - MyAccountBook

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build APK (kivy/buildozer Docker)
        run: |
          # Detect project directory
          if [ -d "${{ github.workspace }}/MyAccountBook" ]; then
            PROJ="MyAccountBook"
          else
            PROJ="."
          fi
          docker run --rm \
            -v "${{ github.workspace }}/$PROJ:/workspace" \
            -w /workspace \
            kivy/buildozer:latest \
            buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: myaccountbook-apk
          path: "**/bin/*.apk"
